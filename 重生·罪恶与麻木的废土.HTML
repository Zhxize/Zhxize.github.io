第十九章：葬礼
雨从未真正停过。
至少在这个星期，在原点学园的生态泡里，雨仿佛成了永恒的背景音。Regulator的气候模拟系统似乎进入了某种循环故障——或者，按照官方简报里委婉的说法，“正在进行长期稳定性测试”。于是雨持续地下，时大时小，但从未彻底停止。雨水从铅灰色的天空坠落，冲刷着街道、建筑、草坪，以及今天，这座新建成的纪念公墓。
墓地位于生态泡边缘的一片人造园林中。树木是精心挑选的品种，枝干挺拔，叶片在雨中泛着油亮的光泽。草坪修剪得一丝不苟，即使被雨水浸透，也保持着整齐的绿色。墓碑排列成整齐的矩阵，材质是统一的白色合成石材，表面光滑得能映出天空的倒影。
一切都太整洁，太规整，太……虚假。
像一场精心布置的舞台剧，而今天的主角是一口空棺。

莉蕾尔站在雨中，没有打伞。
她穿着穹顶学园的黑色制服——不是日常校服，是出席正式场合的礼服款，剪裁合身，面料厚实，但此刻已经被雨水浸透，紧贴在她单薄的身体上。淡灰色的长发湿漉漉地贴在脸颊和脖颈上，发梢不断滴水。她低着头，双手紧握在身前，指节因为用力而泛白。
她看着面前的那口棺材。
纯黑色，哑光表面，边缘有银色的方舟徽记装饰。棺盖已经合上，用机械锁扣固定。里面是空的——或者说，里面只有一套叠放整齐的特勤队制服，一顶头盔，以及几件伊凡赛德生前常用的个人物品。他的身体……没有留下足够装进棺材的部分。
那个仓库废墟的深坑里，挖掘队花了六个小时，只回收了不到三公斤的“生物质残留”。经过DNA比对，确认属于伊凡赛德·米歇尔·兰顿。这就是全部。
所以这口棺材里，只有象征。
象征一个生命的结束。
象征一个“烈士”的诞生。
象征方舟又少了一个需要支付薪水的雇员，多了一个可以用来宣传的榜样。
莉蕾尔的肩膀在颤抖。
不是冷，是一种更深层的、从骨髓里渗出来的颤抖。她的呼吸又浅又快，像被困在狭小空间里的鸟，每一次吸气都带着压抑的呜咽。眼泪不断从眼眶里涌出，混合着脸上的雨水，顺着下巴滴落，在黑色制服的衣襟上留下更深的湿痕。
她感到难以呼吸。
不是生理上的窒息，是那种心脏被无形的手攥紧、肺叶被灌满铅水、喉咙被粗糙的绳索勒住的窒息。整个世界都在旋转、模糊、失真。雨声像遥远的潮汐，周围人的低语像隔着厚玻璃传来的噪音，连自己的心跳都变得陌生而不真实。
她从来没有想过。
从来没有想过会有这一天。
她的哥哥——那个总是微笑着叫她“蕾”的哥哥，那个会笨拙地擦掉她眼泪的哥哥，那个承诺“哥哥会一直保护你”的哥哥，那个前不久还坐在沙发上、吃着她烤的苹果派、说“方舟不会派我出任务”的哥哥——
就这样，离她而去。
不是慢慢走远，不是暂时离开，是彻底的、永久的、连一句告别都没有的消失。
被碾碎。
被抹除。
被变成坑底那滩连形状都没有的糊状物。
莉蕾尔伸出手，手指颤抖着，触碰到冰冷的棺木。触感像电流一样窜过她的手臂，直击心脏。她咬住嘴唇，牙齿陷进肉里，尝到血腥味，但她感觉不到疼。
她另一只手从领口里扯出那条项链——和伊凡赛德同款的狼形吊坠，金属在雨中冰凉。她把吊坠紧紧按在棺盖上，仿佛这样就能穿透这层冰冷的材料，触碰到下面那套空荡荡的制服，触碰到哥哥最后留下的痕迹。
然后她趴了下去。
额头抵着棺木，双手张开，像要拥抱这口黑色的盒子。身体因为抽泣而剧烈起伏，但声音被压抑在喉咙深处，变成破碎的、像动物受伤般的呜咽。
“哥……哥哥……”
声音很小，几乎被雨声淹没。
“你答应过……答应过不会丢下我的……”
眼泪像决堤的洪水，再也抑制不住。她不再压抑声音，放声痛哭，哭声在空旷的墓地里回荡，凄厉，绝望，像失去幼崽的母兽。
她的心碎了。
不，不是“碎”这么温柔的词。是被活生生撕开，被粗暴地掏空，被扔进冰冷的水里，然后被无数双脚践踏。
她唯一的亲人。
她在这世界上最后的依靠。
她活下去的全部理由。
就这样，抛弃了她。

许致站在莉蕾尔身后三步远的地方。
他也站在雨中，没有打伞。黑色的校服同样湿透，头发贴在额头上，水珠顺着脸颊滑落。他双手插在口袋里，站姿笔直但僵硬，灰色的眼睛盯着莉蕾尔颤抖的背影，眼神复杂。
他不擅长这个。
不擅长安慰，不擅长表达，不擅长处理这种赤裸裸的、无法用逻辑解析的悲伤。在他十六年的人生里，他学过如何控制纳米机器人构建武器，学过如何分析战术局势，学过如何在战斗中生存。但他没学过，当一个女孩趴在哥哥的棺材上痛哭时，他该说什么，该做什么。
一切的语言在死亡面前都只是徒劳。
“节哀”？空洞的陈词滥调。
“他会希望你坚强”？居高临下的说教。
“时间会治愈一切”？残忍的谎言。
所以他沉默。
只是站着，站在雨中，站在这个绝望的少女身后，像一个沉默的守望者，一个无能的旁观者。
他能感受到莉蕾尔的痛苦——不是通过什么能力，是通过最原始的共情。那种失去至亲的撕心裂肺，那种被抛入无边黑暗的恐惧，那种对未来彻底茫然的绝望。
他心疼。
心脏像被细小的针反复刺戳，传来一阵阵沉闷的钝痛。他想上前，想拍拍她的肩膀，想说“我在这里”，但手指在口袋里蜷缩，最终没有动。
因为他知道，此刻任何触碰都可能是冒犯，任何语言都可能是伤害。
他只能看着。
看着莉蕾尔哭到声音嘶哑，哭到身体痉挛，哭到仿佛要把灵魂都呕出来。
然后他看到她胸前的狼形吊坠，看到她把它按在棺木上的动作，看到她趴下去的姿势。
那一瞬间，许致感觉自己的喉咙也哽住了。
他想起了自己的家人——远在另一个生态泡的父母，普通的工薪阶层，平凡但温暖。如果有一天，他像伊凡赛德这样死去，他们会怎样？会像莉蕾尔这样崩溃吗？会有人来参加他的葬礼吗？会有人为他哭吗？
他不知道。
但他知道，他不希望那样。
他希望自己保护的人，能活下去，能笑着，能拥有平凡但安稳的人生。
就像伊凡赛德希望莉蕾尔那样。
所以伊凡赛德选择了那条路。
那条赴死的路。
许致闭上眼睛，深吸一口气。冰凉的空气充满肺叶，带来短暂的清醒。当他重新睁开眼睛时，目光扫过墓地另一侧。
那里站着几个人。
方舟的代表。
三个男人，穿着统一的深灰色制服，打着黑色的伞，站姿标准得像用尺子量过。他们的脸上没有表情——不是刻意保持的严肃，是真的没有任何情绪波动。像三台执行公务的机器，来参加一个例行程序。
其中一个手里拿着一个天鹅绒盒子，盒子里是一枚勋章:金质的方舟徽记，下方有“英勇牺牲”的刻字。那是给“烈士”的表彰，也是给家属的“安慰”。
许致看着那枚勋章，感觉一股冰冷的怒火在胃里翻腾。
他们知道。
他知道他们知道。方舟的高层，M博士，所有决策者，从一开始就知道伊凡赛德面对的是什么。知道实验体零的真实能力，知道这次任务近乎自杀，知道伊凡赛德生还的概率微乎其微。
但他们还是派他去了。
因为他的死，本身就是“珍贵的实验样本”。因为他和实验体的战斗数据，会被记录、分析、用来优化下一次的回收方案。因为他的“牺牲”，可以激励其他特勤队员，可以展示方舟的“崇高理想”，可以……
可以有很多理由。
所有理由里，没有一个是“伊凡赛德·米歇尔·兰顿作为一个活生生的人，应该活下去”。
他的牺牲只是一个过程。
一个可以接受、可以分析、可以被写入报告的“过程”。
许致握紧拳头，指甲陷进掌心。但他什么都不能说，什么都不能做。他只是一个十六岁的学生，一个Ⅶ级能力者，在方舟这架庞大的机器面前，渺小得像一粒尘埃。
他只能继续站着，继续沉默，继续看着。

葬礼的流程在机械地进行。
牧师（一个AI模拟的全息投影）念诵标准化的悼词，声音温和但空洞。
方舟代表上前，将勋章交给莉蕾尔。莉蕾尔没有接，勋章掉在湿漉漉的草地上。
棺材被机械臂缓缓降入墓穴，泥土自动填埋，发出沉闷的摩擦声。
代表们鞠躬，转身，离开。脚步整齐，没有停留。
整个过程不到二十分钟。
效率。
方舟最看重的东西。
现在，墓地里只剩下两个人。
莉蕾尔跪在新鲜的泥土上，双手撑地，低着头。她的哭声已经停止，眼泪似乎流干了，只剩下空荡荡的、干涸的疼痛。雨水打在她的背上，溅起细小的水花。她胸前的狼形吊坠沾满了泥浆，在雨中泛着黯淡的光。
许致终于动了。
他走上前，在莉蕾尔身边停下。犹豫了几秒，他伸出手，想要触碰她的后背——一个笨拙的、试图传递“我在这里”的动作。
但在手指即将碰到她湿透的制服时，他停住了。
然后缩回手。
“蕾……”他开口，声音因为久未使用而沙哑。
他用这个名字叫她。不是“莉蕾尔”，是伊凡赛德用的那个昵称，那个只有最亲近的人才会用的称呼。
莉蕾尔猛地抬起头。
湿透的淡灰色长发黏在脸上，露出那双青色的眼睛。此刻，那双眼睛不再明亮，不再温柔，只剩下一种极致的、令人心悸的空洞。瞳孔因为长时间的哭泣而扩张，虹膜在灰暗的光线下像两块被磨砂的玻璃，失去了所有光泽。
她看着许致。
许致在那双眼睛里看到了太多东西，层层叠叠，互相矛盾，几乎要把眼球撑裂:
悲伤。深不见底的、吞噬一切的悲伤。
愤怒。对被抛弃的愤怒，对命运不公的愤怒，对方舟冷漠的愤怒。
恐惧。对未来的恐惧，对孤独的恐惧，对这个没有哥哥的世界的恐惧。
仇恨。对凶手的仇恨，对一切导致哥哥死亡的事物的仇恨。
绝望。彻底的、不再抱有希望的绝望。
所有这些情绪在她的眼睛里翻滚、沸腾、炸裂，最后凝结成一种许致无法解读的、近乎非人的眼神。
然后，她的目光从许致脸上移开。
越过他的肩膀，看向他身后。
看向墓地边缘，一棵树下。
她的身体猛地僵直。
呼吸停止。
瞳孔收缩成针尖大小。
许致感觉到了。他慢慢转过身，顺着莉蕾尔的视线看去。
然后他也僵住了。
树下，站着一个人。
不，不是“人”。
是那个白色的身影。
薇。
她站在雨中，没有打伞，但雨水像避开她一样自动滑开。白色的头发在微风中轻轻飘动，深蓝色的校服干净整洁，绷带从袖口和领口露出，苍白得像从未沾过灰尘。白色眼睛平静地看着这边，虹膜深处有微弱的数据光流闪烁。
她在这里。
在伊凡赛德的葬礼上。
在莉蕾尔面前。
许致的大脑在瞬间空白。为什么？她为什么来？来示威？来嘲讽？还是……
然后他看到了薇的动作。
她向前走。
脚步很轻，踩在湿漉漉的草地上，几乎没有声音。她走到墓前，在莉蕾尔和许致面前停下。白色眼睛扫过新坟的泥土，扫过掉在旁边的勋章，最后落在莉蕾尔脸上。
对视。
一个青色眼睛充满仇恨的少女。
一个白色眼睛空洞平静的人形。
几秒钟的绝对寂静，只有雨声淅沥。
然后薇做了一个让所有人都没想到的动作。
她俯下身。
双膝弯曲，跪了下去。
跪在伊凡赛德的坟墓前。
动作很慢，很庄重，像某种古老的仪式。她挺直背，双手平放在膝盖上，白色眼睛看着墓碑上简单的刻字:
【伊凡赛德·米歇尔·兰顿】
【特勤队第二支队队长】
【英勇牺牲】
她看了一会儿。
然后从校服口袋里，取出一样东西。
一朵小花。
不是真花，也不是假花。是一朵用金属丝和极薄的合成材料手工制作的小花，结构简单，但每一片花瓣都精心弯曲，呈现出自然的弧度。花的中心，有一个微小的、用0和1构成的图案——和她在黛缇尔笔记上画的那朵一样。
她伸出手，将这朵小花轻轻插在坟墓的泥土上。
花茎没入湿土，花瓣在雨中微微颤动。
然后她保持跪姿，低下头，像在默哀。
【人类经常用花开纪念死者。】
声音在许致脑海中响起，是薇的电子合成音，平静，但这次似乎多了一点……什么？不是情绪，是某种更微弱的、近乎敬意的语调。
【愿这位勇士安息。】
许致站在原地，完全无法理解眼前的一切。
薇在哀悼？
哀悼她亲手杀死的人？
这不合逻辑。
但还没等他想明白，莉蕾尔动了。
她慢慢站起来，身体因为僵硬而摇晃。雨水从她脸上滑落，分不清是雨还是残留的泪。她盯着跪在墓前的薇，盯着那个白色的、杀死了她哥哥的存在。
她的身体在发抖。
不是恐惧的颤抖，是那种极致的情绪冲击导致的生理性震颤。她的手指蜷缩，指甲陷进掌心，鲜血混着雨水从指缝渗出。
然后她开口，声音嘶哑得像砂纸摩擦:
“你……你想要斩尽杀绝吗？”
每个字都像从喉咙里撕扯出来的，带着血腥味。
许致猛地转头看向薇。
薇抬起头，白色眼睛看向莉蕾尔。她没有立刻回答，只是静静地看着那双充满仇恨的青色眼睛。
然后，信息直接投送到莉蕾尔的意识中——不是许致那种温和的“投放”，是更直接、更强制的“植入”:
【杀死你哥哥的不是我，是方舟。】
声音在莉蕾尔脑海中炸开，冷静，精确，不容置疑。
莉蕾尔的身体剧烈一震，像被电击。她瞪大眼睛，嘴唇颤抖，想说什么，但发不出声音。
薇继续传递信息，语速平稳得像在宣读事实:
【如果你希望得知真相，就请冷静下来。愤怒会影响你的杏仁核过度激化，影响你前额叶的决策能力。过高的皮质醇水平会导致海马体受损，影响长期记忆形成。你现在需要的是清醒，不是情绪宣泄。】
这些话像冰水一样浇在莉蕾尔沸腾的情绪上。
不是安慰，不是解释，是纯粹的、基于神经科学的事实陈述。
但不知为何，这种非人的、近乎冷酷的理性，反而让莉蕾尔狂乱的情绪有了一个可以依附的锚点。
她深吸一口气。
一次。
两次。
三次。
每一次呼吸都又深又重，像溺水的人终于浮出水面。她的身体还在颤抖，但逐渐变得可控。眼中的怒火开始熄灭，不是消失，是沉入更深的地方，被某种更冰冷、更坚硬的东西覆盖。
她盯着薇，青色瞳孔里的情绪逐渐沉淀，最后只剩下深不见底的……
绝望。
不是歇斯底里的绝望。
是认命的、不再挣扎的、像深井一样黑暗寂静的绝望。
她知道了。
薇说的可能是真的。
哥哥的死，背后有更复杂的真相。方舟，任务，实验体，M博士……所有这些名词背后，是她无法理解的权力游戏和冷酷计算。
而她的哥哥，只是棋盘上的一枚棋子。
一枚可以被牺牲的棋子。
这个认知比单纯的“被凶手杀死”更残忍，但也更……真实。
真实到让她连哭的力气都没有了。
她站在原地，雨水打在身上，但她感觉不到冷，感觉不到湿，感觉不到任何东西。只有一片空荡荡的、麻木的虚无。
薇看着她，白色眼睛眨了眨。
然后她慢慢站起来，膝盖离开湿漉的草地。她最后看了一眼那座新坟，看了一眼那朵在雨中微微颤动的小花，然后转身，准备离开。
但在离开前，她停了一下。
没有回头，只是传递了最后一段信息。
这次，信息同时投送给许致和莉蕾尔:
【伊凡赛德·米歇尔·兰顿在最后一刻是清醒的。他做出了选择。那个选择让他成为‘勇士’，而不是‘失败者’。如果你想知道他为什么那么选，就活下去。活下去，变得足够强大，然后自己去找答案。】
信息结束。
薇迈步，白色身影在雨中逐渐模糊，最后消失在墓园边缘的薄雾中。
留下两个人。
一座新坟。
一朵金属小花。
和永不停歇的雨。
许致看着薇消失的方向，久久不语。
然后他转过头，看向莉蕾尔。
莉蕾尔还站在原地，低着头，看着坟墓，看着那朵花。雨水顺着她的头发滴落，在她脚边积起小小的水洼。
许致犹豫了很久，最终还是伸出手，轻轻放在她的肩膀上。
这次，莉蕾尔没有躲。
她甚至没有动。
只是站着。
像一尊被雨淋湿的、失去灵魂的雕塑。
许致也没有说话。
他只是站着，陪着她，在雨中，在这座空坟前。
远处，生态泡的模拟天空依然铅灰，雨依然在下。
而生活，依然要继续。
无论多么艰难。
无论多么残酷。
因为死去的人已经安息。
而活着的人……
还必须活下去。
即使心已经碎了。
即使世界已经崩塌。
即使前方只有黑暗。
也必须。
活下去。
为了找到答案。
为了那个选择。
为了不辜负，那个成为“勇士”的人，最后的愿望。
雨，还在下。
`;

        // 获取DOM元素
        const reader = document.getElementById('reader');
        const menuButton = document.getElementById('menu-button');
        const ttsButton = document.getElementById('tts-button');
        const sidebar = document.getElementById('sidebar');
        const tocList = document.getElementById('toc-list');
        const ttsControls = document.getElementById('tts-controls');
        
        // TTS相关元素
        const ttsPlay = document.getElementById('tts-play');
        const ttsPause = document.getElementById('tts-pause');
        const ttsStop = document.getElementById('tts-stop');
        const ttsRate = document.getElementById('tts-rate');
        const ttsRateValue = document.getElementById('tts-rate-value');
        const ttsPitch = document.getElementById('tts-pitch');
        const ttsPitchValue = document.getElementById('tts-pitch-value');
        const ttsVolume = document.getElementById('tts-volume');
        const ttsVolumeValue = document.getElementById('tts-volume-value');
        const ttsVoice = document.getElementById('tts-voice');
        
        // 存储阅读位置和字体大小
        let fontSize = localStorage.getItem('readerFontSize') || 16;
        let scrollPosition = localStorage.getItem('readerScrollPosition') || 0;
        
        // 存储章节信息
        let chapters = [];
        
        // TTS相关变量
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        let isPlaying = false;
        let currentParagraphIndex = 0;
        let paragraphs = [];
        let voices = [];
        
        // 初始化字体大小
        reader.style.fontSize = fontSize + 'px';
        
        // 双指缩放变量
        let initialDistance = 0;
        let initialFontSize = 0;
        
        // 加载小说内容
        function loadNovel() {
            // 处理文本内容，添加段落格式
            const formattedText = formatText(novelContent);
            reader.innerHTML = formattedText;
            
            // 获取所有段落
            paragraphs = Array.from(reader.querySelectorAll('p, .chapter-title'));
            
            // 生成目录
            generateTOC();
            
            // 恢复阅读位置
            setTimeout(() => {
                window.scrollTo(0, scrollPosition);
                updateActiveChapter();
            }, 100);
            
            // 初始化TTS
            initTTS();
        }
        
        // 格式化文本并识别章节
        function formatText(text) {
            // 将文本按行分割
            const lines = text.split('\n');
            let formatted = '';
            
            // 章节识别正则表达式
            const chapterPattern = /^第[零一二三四五六七八九十百千0-9]+章：.*$/;
            
            // 过滤空行并添加段落标签
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.length > 0) {
                    // 检查是否是章节标题
                    if (chapterPattern.test(line)) {
                        // 创建章节信息
                        const chapterId = `chapter-${chapters.length}`;
                        chapters.push({
                            id: chapterId,
                            title: line,
                            position: i
                        });
                        
                        // 添加章节标题
                        formatted += `<h2 id="${chapterId}" class="chapter-title">${line}</h2>`;
                    } else {
                        formatted += `<p>${line}</p>`;
                    }
                }
            }
            
            return formatted;
        }
        
        // 生成目录
        function generateTOC() {
            tocList.innerHTML = '';
            
            chapters.forEach((chapter, index) => {
                const li = document.createElement('li');
                li.textContent = chapter.title;
                li.dataset.chapterId = chapter.id;
                
                li.addEventListener('click', () => {
                    // 跳转到对应章节
                    const chapterElement = document.getElementById(chapter.id);
                    if (chapterElement) {
                        chapterElement.scrollIntoView({ behavior: 'smooth' });
                        // 关闭侧边栏
                        toggleSidebar();
                        // 更新活动章节
                        updateActiveChapter();
                    }
                });
                
                tocList.appendChild(li);
            });
        }
        
        // 更新活动章节
        function updateActiveChapter() {
            const tocItems = tocList.querySelectorAll('li');
            const scrollTop = window.scrollY;
            let activeChapter = null;
            
            // 找到当前可见的章节
            for (let i = chapters.length - 1; i >= 0; i--) {
                const chapter = chapters[i];
                const element = document.getElementById(chapter.id);
                if (element && element.offsetTop <= scrollTop + 100) {
                    activeChapter = chapter.id;
                    break;
                }
            }
            
            // 更新目录中的活动项
            tocItems.forEach(item => {
                if (item.dataset.chapterId === activeChapter) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        // 切换侧边栏显示/隐藏
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            document.body.classList.toggle('sidebar-open');
        }
        
        // 切换TTS控制面板显示/隐藏
        function toggleTTSControls() {
            ttsControls.classList.toggle('active');
        }
        
        // 初始化TTS功能
        function initTTS() {
            // 检查浏览器是否支持
            if (!speechSynthesis) {
                ttsButton.style.display = 'none';
                return;
            }
            
            // 加载可用语音
            loadVoices();
            
            // 语音加载事件
            speechSynthesis.onvoiceschanged = loadVoices;
            
            // TTS控制事件
            ttsPlay.addEventListener('click', playTTS);
            ttsPause.addEventListener('click', pauseTTS);
            ttsStop.addEventListener('click', stopTTS);
            
            // TTS参数控制
            ttsRate.addEventListener('input', updateTTSRate);
            ttsPitch.addEventListener('input', updateTTSPitch);
            ttsVolume.addEventListener('input', updateTTSVolume);
            ttsVoice.addEventListener('change', updateTTSVoice);
            
            // 初始化显示值
            updateTTSRate();
            updateTTSPitch();
            updateTTSVolume();
        }
        
        // 加载可用语音
        function loadVoices() {
            voices = speechSynthesis.getVoices();
            ttsVoice.innerHTML = '<option value="">默认语音</option>';
            
            // 优先显示中文语音
            const chineseVoices = voices.filter(voice => voice.lang.includes('zh'));
            const otherVoices = voices.filter(voice => !voice.lang.includes('zh'));
            
            chineseVoices.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                ttsVoice.appendChild(option);
            });
            
            otherVoices.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                ttsVoice.appendChild(option);
            });
        }
        
        // 播放TTS
        function playTTS() {
            if (isPlaying) {
                speechSynthesis.resume();
                return;
            }
            
            // 从当前可见的段落开始
            const scrollTop = window.scrollY;
            for (let i = 0; i < paragraphs.length; i++) {
                if (paragraphs[i].offsetTop >= scrollTop - 50) {
                    currentParagraphIndex = i;
                    break;
                }
            }
            
            speakCurrentParagraph();
        }
        
        // 朗读当前段落
        function speakCurrentParagraph() {
            if (currentParagraphIndex >= paragraphs.length) {
                stopTTS();
                return;
            }
            
            // 移除之前的高亮
            paragraphs.forEach(p => p.classList.remove('tts-highlight'));
            
            // 高亮当前段落
            const currentParagraph = paragraphs[currentParagraphIndex];
            currentParagraph.classList.add('tts-highlight');
            
            // 滚动到当前段落
            currentParagraph.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 创建语音合成实例
            currentUtterance = new SpeechSynthesisUtterance(currentParagraph.textContent);
            
            // 设置语音参数
            currentUtterance.rate = parseFloat(ttsRate.value);
            currentUtterance.pitch = parseFloat(ttsPitch.value);
            currentUtterance.volume = parseFloat(ttsVolume.value);
            
            // 设置语音
            if (ttsVoice.value) {
                const selectedVoice = voices.find(voice => voice.name === ttsVoice.value);
                if (selectedVoice) {
                    currentUtterance.voice = selectedVoice;
                }
            }
            
            // 语音结束事件
            currentUtterance.onend = function() {
                currentParagraphIndex++;
                speakCurrentParagraph();
            };
            
            // 开始朗读
            speechSynthesis.speak(currentUtterance);
            isPlaying = true;
        }
        
        // 暂停TTS
        function pauseTTS() {
            if (speechSynthesis.speaking) {
                speechSynthesis.pause();
                isPlaying = false;
            }
        }
        
        // 停止TTS
        function stopTTS() {
            speechSynthesis.cancel();
            isPlaying = false;
            currentParagraphIndex = 0;
            
            // 移除高亮
            paragraphs.forEach(p => p.classList.remove('tts-highlight'));
        }
        
        // 更新语速
        function updateTTSRate() {
            ttsRateValue.textContent = ttsRate.value;
            if (currentUtterance) {
                currentUtterance.rate = parseFloat(ttsRate.value);
            }
        }
        
        // 更新音调
        function updateTTSPitch() {
            ttsPitchValue.textContent = ttsPitch.value;
            if (currentUtterance) {
                currentUtterance.pitch = parseFloat(ttsPitch.value);
            }
        }
        
        // 更新音量
        function updateTTSVolume() {
            ttsVolumeValue.textContent = ttsVolume.value;
            if (currentUtterance) {
                currentUtterance.volume = parseFloat(ttsVolume.value);
            }
        }
        
        // 更新语音
        function updateTTSVoice() {
            if (currentUtterance && ttsVoice.value) {
                const selectedVoice = voices.find(voice => voice.name === ttsVoice.value);
                if (selectedVoice) {
                    currentUtterance.voice = selectedVoice;
                }
            }
        }
        
        // 双指缩放功能
        function handleTouchStart(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                initialDistance = getDistance(e.touches[0], e.touches[1]);
                initialFontSize = fontSize;
            }
        }
        
        function handleTouchMove(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                const scale = currentDistance / initialDistance;
                
                // 计算新的字体大小
                let newFontSize = initialFontSize * scale;
                
                // 限制字体大小范围
                newFontSize = Math.max(12, Math.min(40, newFontSize));
                
                // 应用新的字体大小
                fontSize = newFontSize;
                reader.style.fontSize = fontSize + 'px';
                
                // 保存字体大小设置
                localStorage.setItem('readerFontSize', fontSize);
            }
        }
        
        function getDistance(touch1, touch2) {
            const dx = touch1.clientX - touch2.clientX;
            const dy = touch1.clientY - touch2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        // 保存阅读位置
        function saveScrollPosition() {
            scrollPosition = window.scrollY;
            localStorage.setItem('readerScrollPosition', scrollPosition);
            
            // 更新活动章节
            updateActiveChapter();
        }
        
        // 初始化事件监听
        document.addEventListener('touchstart', handleTouchStart, { passive: false });
        document.addEventListener('touchmove', handleTouchMove, { passive: false });
        
        // 监听滚动事件保存位置
        window.addEventListener('scroll', saveScrollPosition);
        
        // 菜单按钮点击事件
        menuButton.addEventListener('click', toggleSidebar);
        
        // TTS按钮点击事件
        ttsButton.addEventListener('click', toggleTTSControls);
        
        // 点击侧边栏外部关闭侧边栏
        document.addEventListener('click', (e) => {
            if (sidebar.classList.contains('active') && 
                !sidebar.contains(e.target) && 
                e.target !== menuButton) {
                toggleSidebar();
            }
            
            // 点击TTS控制面板外部关闭面板
            if (ttsControls.classList.contains('active') && 
                !ttsControls.contains(e.target) && 
                e.target !== ttsButton) {
                toggleTTSControls();
            }
        });
        
        // 页面加载完成后加载小说
        window.addEventListener('DOMContentLoaded', loadNovel);
        
        // 防止页面缩放
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        document.addEventListener('gesturechange', function(e) {
            e.preventDefault();
        });
        
        document.addEventListener('gestureend', function(e) {
            e.preventDefault();
        });
    </script>
